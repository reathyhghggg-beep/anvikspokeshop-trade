<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anvik's PokeShop & Trade</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-container">
        <div class="logo">⚡ Anvik's PokeShop & Trade</div>

        <ul class="nav-links">
            <li><a href="#cards">Cards</a></li>
            <li><a href="#schedule">Schedule</a></li>
            <li><a href="#admin">Admin</a></li>
        </ul>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Welcome to PokeShop & Trade</h1>
    <p>Buy or Trade Pokémon Cards (Near Mint Pricing)</p>
</section>

<!-- CARDS -->
<section id="cards" class="cards-section">
    <h2>Card Collection</h2>
    <div class="cards-grid" id="cardsGrid"></div>
</section>

<!-- MODAL -->
<div id="cardModal" class="modal">
    <div class="modal-content">

        <span class="close">&times;</span>

        <img id="modalCardImage" class="modal-img">
        <h2 id="modalCardTitle"></h2>

        <div class="button-group">
            <button id="tradeBtn">Trade</button>
            <button id="buyBtn">Buy</button>
        </div>

        <div id="tradeForm" class="hidden">
            <textarea id="tradeInput" placeholder="Your trade cards..."></textarea>
            <button id="tradeSubmit">Submit Trade</button>
        </div>

        <div id="buyForm" class="hidden">
            <input type="number" id="buyInput" placeholder="Your offer ($)">
            <button id="buySubmit">Submit Offer</button>
        </div>

    </div>
</div>

<!-- CONTACT -->
<section class="contact">
    <h2>Contact</h2>
    <p>Contact Reathyhghggg@gmail.com for more details</p>
</section>

<!-- SCHEDULE -->
<section id="schedule">
    <h2>Schedule Meeting</h2>

    <form id="scheduleForm">
        <input type="text" placeholder="Name" required>
        <input type="email" placeholder="Email" required>
        <input type="datetime-local" required>
        <button type="submit">Schedule</button>
    </form>
</section>

<!-- ADMIN -->
<section id="admin" class="admin">
    <h2>Admin Panel</h2>

    <input type="password" id="adminPassword" placeholder="Enter password">
    <button id="adminLoginBtn">Login</button>

    <div id="adminPanel" class="hidden">
        <h3>Requests</h3>
        <div id="requestsList"></div>
    </div>
</section>

<footer>
    <p>© 2026 PokeShop & Trade</p>
</footer>

<script src="script.js"></script>

</body>
</html>
